<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix</title>
    <style>
        :root {
            --netflix-red: #E50914;
            --netflix-black: #141414;
        }

        body, html {
            margin: 0; padding: 0; background-color: var(--netflix-black);
            color: white; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            overflow-x: hidden; user-select: none; scroll-behavior: smooth;
        }

        /* 1. START & INTRO SCREENS */
        #start-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: black; z-index: 10000; display: flex; justify-content: center; align-items: center;
        }
        .start-btn {
            background-color: var(--netflix-red); color: white; border: none; 
            padding: 15px 40px; font-size: 1.5rem; font-weight: bold; 
            letter-spacing: 2px; border-radius: 4px; cursor: pointer; transition: transform 0.2s; text-transform: uppercase;
        }
        .start-btn:hover { transform: scale(1.05); }

        #intro-screen {
            display: none; position: fixed; top: 0; left: 0; 
            width: 100vw; height: 100vh; background-color: black; z-index: 9000;
        }
        #intro-video { width: 100%; height: 100%; object-fit: cover; }

        /* 2. PROFILE SCREEN */
        #profile-screen {
            display: none; height: 100vh; flex-direction: column; 
            justify-content: center; align-items: center; text-align: center;
            position: fixed; width: 100%; z-index: 500; background-color: var(--netflix-black);
        }
        #profile-screen h1 { font-size: 3vw; font-weight: 400; margin-bottom: 2em; }
        .profiles-container { display: flex; gap: 2vw; }
        .profile { cursor: pointer; transition: transform 0.2s; }
        .profile:hover { transform: scale(1.1); }
        .profile img { width: 10vw; height: 10vw; border-radius: 4px; border: 2px solid transparent; object-fit: cover; }
        .profile:hover img { border-color: white; }
        .profile span { display: block; margin-top: 10px; color: grey; font-size: 1.2vw; }
        .profile:hover span { color: white; }

        /* 3. MAIN DASHBOARD & NAVBAR */
        #main-screen { display: none; padding-bottom: 50px; min-height: 100vh; }
        nav {
            position: fixed; top: 0; width: 100%; padding: 20px 40px; display: flex;
            align-items: center; justify-content: space-between;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9) 10%, rgba(0,0,0,0));
            z-index: 100; transition: background-color 0.4s; box-sizing: border-box;
        }
        .nav-left { display: flex; align-items: center; }
        .logo { color: var(--netflix-red); font-size: 30px; font-weight: 900; margin-right: 40px; cursor: pointer; letter-spacing: 2px; transition: transform 0.2s; }
        .logo:hover { transform: scale(1.05); }
        
        /* SEARCH BAR */
        .search-container { display: flex; align-items: center; background: rgba(0,0,0,0.7); border: 1px solid white; padding: 5px 10px; border-radius: 4px; }
        .search-container input { background: transparent; border: none; color: white; outline: none; font-size: 1rem; padding: 5px; width: 220px; }
        .search-container button { background: transparent; border: none; color: white; cursor: pointer; font-size: 1.2rem; }

        /* HERO BANNER */
        .hero {
            height: 85vh; background-size: cover; background-position: center;
            background-image: url('our_story.jpg'); 
            position: relative;
        }
        .hero-vignette {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to right, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 60%),
                        linear-gradient(to top, var(--netflix-black) 0%, rgba(0,0,0,0) 20%);
        }
        .hero-content { position: absolute; bottom: 25%; left: 40px; width: 40%; }
        .hero-title { font-size: 4rem; font-weight: bold; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
        .hero-description { font-size: 1.2rem; margin-bottom: 25px; line-height: 1.5; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }

        .play-btn {
            background-color: white; color: black; border: none; padding: 10px 30px;
            font-size: 1.2rem; font-weight: bold; border-radius: 4px; cursor: pointer;
            display: flex; align-items: center; gap: 10px; transition: transform 0.2s, background-color 0.2s;
        }
        .play-btn:hover { background-color: rgba(255,255,255,0.7); transform: scale(1.05); }

        /* ROWS STYLING */
        .content-container { margin-top: -20px; position: relative; z-index: 10; }
        .row { margin-left: 40px; margin-bottom: 40px; }
        .row h2 { font-size: 1.4vw; margin-bottom: 15px; font-weight: 500; text-transform: capitalize; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }
        
        .row-posters { display: flex; overflow-y: hidden; overflow-x: scroll; padding: 10px 0 20px 0; gap: 12px; }
        .row-posters::-webkit-scrollbar { display: none; }
        
        .search-results-grid { display: flex; flex-wrap: wrap; gap: 15px; padding: 10px 40px 40px 40px; margin-top: 100px; }
        .row-poster { width: 14vw; height: 20vw; object-fit: cover; transition: transform 450ms; cursor: pointer; border-radius: 4px; }
        .row-poster:hover { transform: scale(1.08); z-index: 2; border: 1px solid white; box-shadow: 0px 0px 15px rgba(0,0,0,0.8); }

        /* 4. MOVIE POPUP PLAYER UI */
        #movie-popup-container {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: black; z-index: 999999;
        }
        
        /* NEW SERVER SELECTOR UI */
        #server-selector-ui {
            position: absolute; top: 20px; left: 40px; z-index: 1000; display: none; gap: 10px;
        }
        .server-btn {
            background-color: rgba(30, 30, 30, 0.8); color: white; border: 1px solid grey;
            padding: 8px 15px; font-size: 1rem; border-radius: 4px; cursor: pointer; transition: 0.2s;
        }
        .server-btn:hover { background-color: var(--netflix-red); border-color: var(--netflix-red); }
        #server-prompt-text {
            color: white; font-size: 1.5rem; position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); z-index: 900; display: none;
        }

        .close-popup-btn {
            position: absolute; top: 20px; right: 30px; z-index: 1000; font-size: 30px; color: white;
            background: rgba(0,0,0,0.5); border: none; border-radius: 50%; width: 50px; height: 50px; 
            cursor: pointer; display: flex; justify-content: center; align-items: center; transition: background 0.2s;
        }
        .close-popup-btn:hover { background: rgba(255,255,255,0.3); }
        
        /* Dual Players */
        #movie-iframe { width: 100%; height: 100%; border: none; display: none; position: relative; z-index: 500; }
        #local-video-player { width: 100%; height: 100%; object-fit: contain; display: none; background: black; position: relative; z-index: 500; }

    </style>
</head>
<body>

    <div id="start-screen"><button class="start-btn" onclick="startExperience()">Open Gift</button></div>

    <div id="intro-screen">
        <video id="intro-video" playsinline><source src="netflix_intro.mp4" type="video/mp4"></video>
    </div>

    <div id="profile-screen">
        <h1>Who's watching?</h1>
        <div class="profiles-container">
            <div class="profile" onclick="enterNetflix()">
                <img src="https://upload.wikimedia.org/wikipedia/commons/0/0b/Netflix-avatar.png" alt="Janvi">
                <span>Janvi</span>
            </div>
            <div class="profile" onclick="enterNetflix()">
                <img src="https://upload.wikimedia.org/wikipedia/commons/0/0b/Netflix-avatar.png" style="filter: hue-rotate(200deg);" alt="Satyam">
                <span>Satyam</span>
            </div>
        </div>
    </div>

    <div id="main-screen">
        <nav id="navbar">
            <div class="nav-left">
                <div class="logo" onclick="resetHome()">NETFLIX</div>
            </div>
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Search any movie..." onkeypress="handleSearchEnter(event)">
                <button onclick="searchMovies()">🔍</button>
            </div>
        </nav>

        <div id="home-view">
            <header class="hero">
                <div class="hero-vignette"></div>
                <div class="hero-content">
                    <h1 class="hero-title">Our Story</h1>
                    <p class="hero-description">A cinematic journey of all the beautiful moments we've shared so far. Hit play to relive the memories.</p>
                    
                    <button class="play-btn" onclick="playOurStory()">
                        <span style="font-size: 1.5rem;">▶</span> Play
                    </button>
                </div>
            </header>

            <div class="content-container">
                <div class="row">
                    <h2>Her Absolute Favorites</h2>
                    <div class="row-posters" id="favorites-row"></div>
                </div>

                <div class="row">
                    <h2>Trending Romances (Global)</h2>
                    <div class="row-posters" id="romance-row"></div>
                </div>
                <div class="row">
                    <h2>Late Night Thrillers (Global)</h2>
                    <div class="row-posters" id="thriller-row"></div>
                </div>
            </div>
        </div>

        <div id="search-view" style="display: none;">
            <h2 style="margin-left: 40px; margin-top: 100px;">Search Results</h2>
            <div class="search-results-grid" id="search-results-container"></div>
        </div>

    </div>

    <div id="movie-popup-container">
        
        <div id="server-selector-ui">
            <button class="server-btn" onclick="loadServer(1)">Server 1 (Vidsrc)</button>
            <button class="server-btn" onclick="loadServer(2)">Server 2 (VidLink)</button>
            <button class="server-btn" onclick="loadServer(3)">Server 3 (Multi)</button>
            <button class="server-btn" onclick="loadServer(4)">Server 4 (Smashy)</button>
        </div>

        <h2 id="server-prompt-text">Please select a server from the top left ⬆️</h2>

        <button class="close-popup-btn" onclick="closeMoviePopup()">✖</button>
        
        <iframe id="movie-iframe" src="" allowfullscreen></iframe>
        
        <video id="local-video-player" controls>
            <source src="our_story.mp4" type="video/mp4">
            Your browser does not support HTML video.
        </video>
    </div>

    <script>
        const OMDB_API_KEY = "add6120a"; 
        let activeMovieId = ""; // Stores the IMDB ID for server switching

        function startExperience() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('intro-screen').style.display = 'block';
            const introVideo = document.getElementById('intro-video');
            introVideo.play().catch(e => { showProfiles(); });
            introVideo.onended = () => { showProfiles(); };
        }

        function showProfiles() {
            document.getElementById('intro-video').pause();
            document.getElementById('intro-screen').style.display = 'none';
            document.getElementById('profile-screen').style.display = 'flex';
        }

        function enterNetflix() {
            document.getElementById('profile-screen').style.display = 'none';
            document.getElementById('main-screen').style.display = 'block';
            window.scrollTo(0, 0); 
            
            loadHardcodedFavorites();
            loadAutomatedRow("Love", "romance-row");
            loadAutomatedRow("Thriller", "thriller-row");
        }

        window.addEventListener('scroll', () => {
            const nav = document.getElementById('navbar');
            if (window.scrollY > 50) nav.style.backgroundColor = '#141414';
            else nav.style.backgroundColor = 'transparent';
        });

        // --- 1. DATA BUILDERS ---
        function loadHardcodedFavorites() {
            const favorites = [
                { title: "The Notebook", imdbId: "tt0332280", poster: "https://upload.wikimedia.org/wikipedia/en/8/86/Posternotebook.jpg" },
                { title: "La La Land", imdbId: "tt3783958", poster: "https://upload.wikimedia.org/wikipedia/en/a/ab/La_La_Land_%28film%29.png" },
                { title: "Titanic", imdbId: "tt0120338", poster: "https://upload.wikimedia.org/wikipedia/en/1/18/Titanic_%281997_film%29_poster.png" },
                { title: "Pride & Prejudice", imdbId: "tt0414387", poster: "https://upload.wikimedia.org/wikipedia/en/0/03/Prideandprejudiceposter.jpg" }
            ];

            const container = document.getElementById('favorites-row');
            favorites.forEach(movie => {
                const img = document.createElement('img');
                img.className = 'row-poster';
                img.src = movie.poster;
                img.onclick = () => openMovieOptions(movie.imdbId);
                container.appendChild(img);
            });
        }

        function loadAutomatedRow(searchWord, containerId) {
            const url = `https://www.omdbapi.com/?s=${searchWord}&type=movie&apikey=${OMDB_API_KEY}`;
            fetch(url).then(res => res.json()).then(data => {
                const container = document.getElementById(containerId);
                if (data.Search) {
                    data.Search.forEach(movie => {
                        if (movie.Poster && movie.Poster !== "N/A") {
                            const img = document.createElement('img');
                            img.className = 'row-poster';
                            img.src = movie.Poster;
                            img.onclick = () => openMovieOptions(movie.imdbID);
                            container.appendChild(img);
                        }
                    });
                }
            });
        }

        function searchMovies() {
            const query = document.getElementById('searchInput').value;
            if (!query) return;
            document.getElementById('home-view').style.display = 'none';
            document.getElementById('search-view').style.display = 'block';
            window.scrollTo(0, 0);
            
            const container = document.getElementById('search-results-container');
            container.innerHTML = '<p style="color:white; margin-left:20px;">Searching global database...</p>';

            fetch(`https://www.omdbapi.com/?s=${encodeURIComponent(query)}&type=movie&apikey=${OMDB_API_KEY}`)
                .then(res => res.json()).then(data => {
                    container.innerHTML = ''; 
                    if (data.Response === "True") {
                        data.Search.forEach(movie => {
                            if (movie.Poster && movie.Poster !== "N/A") {
                                const img = document.createElement('img');
                                img.className = 'row-poster';
                                img.src = movie.Poster;
                                img.onclick = () => openMovieOptions(movie.imdbID);
                                container.appendChild(img);
                            }
                        });
                    } else {
                        container.innerHTML = `<p style="color:white; margin-left:20px;">No movies found.</p>`;
                    }
                });
        }

        function handleSearchEnter(event) { if (event.key === "Enter") searchMovies(); }
        function resetHome() {
            document.getElementById('searchInput').value = '';
            document.getElementById('search-view').style.display = 'none';
            document.getElementById('home-view').style.display = 'block';
            window.scrollTo(0,0);
        }

        // --- 2. MULTI-SERVER VIDEO LOGIC ---

        function playOurStory() {
            document.getElementById('movie-popup-container').style.display = 'block';
            document.getElementById('movie-iframe').style.display = 'none';
            document.getElementById('server-selector-ui').style.display = 'none';
            document.getElementById('server-prompt-text').style.display = 'none';
            
            const localPlayer = document.getElementById('local-video-player');
            localPlayer.style.display = 'block';
            localPlayer.play();
        }

        function openMovieOptions(imdbId) {
            activeMovieId = imdbId; // Save the ID for the buttons to use
            
            document.getElementById('movie-popup-container').style.display = 'block';
            document.getElementById('local-video-player').style.display = 'none';
            document.getElementById('local-video-player').pause();
            
            document.getElementById('movie-iframe').style.display = 'none';
            document.getElementById('movie-iframe').src = ""; 
            
            // Show the server selector and the prompt text
            document.getElementById('server-selector-ui').style.display = 'flex';
            document.getElementById('server-prompt-text').style.display = 'block';
        }

        function loadServer(serverNum) {
            document.getElementById('server-prompt-text').style.display = 'none';
            const iframe = document.getElementById('movie-iframe');
            iframe.style.display = 'block';

            // 4 Completely different piracy architectures to bypass ISP Blocks
            if(serverNum === 1) iframe.src = `https://vidsrc.me/embed/movie?imdb=${activeMovieId}`; // The original API you liked
            if(serverNum === 2) iframe.src = `https://vidlink.pro/movie/${activeMovieId}`; // New, very stable API
            if(serverNum === 3) iframe.src = `https://multiembed.mov/?video_id=${activeMovieId}&tmdb=0`; // Aggregator API
            if(serverNum === 4) iframe.src = `https://embed.smashystream.com/playere.php?imdb=${activeMovieId}`; // Backup API
        }

        function closeMoviePopup() {
            document.getElementById('movie-popup-container').style.display = 'none';
            document.getElementById('movie-iframe').src = ""; 
            document.getElementById('local-video-player').pause();
            
            // Reset UI for next time
            document.getElementById('server-selector-ui').style.display = 'none';
            document.getElementById('server-prompt-text').style.display = 'none';
        }
    </script>
</body>
</html>
